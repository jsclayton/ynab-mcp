name: Update Deno Lock File

on:
  push:
    branches: ["renovate/**"]

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: deno install

      - name: Commit updated lock file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deno.lock
          git diff --cached --quiet || git commit -m "chore: update deno.lock"
          git push
